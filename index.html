<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14天四川專屬旅遊行程 (成都/九寨溝/黃龍/峨嵋山/樂山)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隱藏捲軸但保留滾動功能 */
        .scrollbar-hide::-webkit-scrollbar {

<body class="bg-gray-100 font-sans text-gray-800">

    <!-- 載入中畫面 -->

            <i class="fa-solid fa-circle-notch fa-spin fa-3x mb-4"></i>
            <p class="text-lg font-semibold">載入中...</p>
        </div>
    </div>

    <!-- 登入畫面 -->

        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="bg-white p-8 rounded-2xl shadow-2xl z-10 max-w-md w-full mx-4 text-center">

            <h1 class="text-2xl font-bold text-gray-800 mb-2">帶爸媽去四川 14天</h1>
            <p class="text-gray-500 mb-8">成都 · 九寨溝 · 黃龍 · 峨嵋山 · 樂山</p>

    <!-- 主應用程式畫面 -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col md:flex-row h-screen overflow-hidden">
        
        <!-- 欄位 1：左側時間軸 (Days) -->
        <div class="w-full md:w-64 bg-white border-r border-gray-200 flex flex-col shrink-0 h-auto md:h-full z-20">
            <div class="p-4 bg-emerald-600 text-white flex justify-between items-center shrink-0">
                <div>
                    <h2 class="font-bold text-lg">四川之旅</h2>
                    <p class="text-xs opacity-80">2026.07.03 - 07.16 <span id="visitor-badge" class="hidden font-bold text-yellow-300">(訪客)</span></p>
                </div>
                <div class="flex gap-1">
                    <button id="btn-share" class="p-2 hover:bg-emerald-700 rounded-full transition hidden" title="分享給家人">
                        <i class="fa-solid fa-share-nodes"></i>
                    </button>
                    <button id="btn-logout" class="p-2 hover:bg-emerald-700 rounded-full transition" title="登出">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
            <div id="sidebar-days" class="flex-1 overflow-y-auto p-2 scrollbar-hide flex md:flex-col overflow-x-auto">
                <!-- Days 會由 JS 動態生成 -->
            </div>
        </div>

        <!-- 欄位 2：中間行程細節 (Activities) -->
        <div class="flex-1 flex flex-col overflow-hidden relative bg-gray-50">
            <div class="p-6 bg-white border-b border-gray-200 shrink-0 shadow-sm z-10 flex justify-between items-center">
                <div>
                    <h1 id="header-date" class="text-2xl font-bold text-gray-800">日期</h1>
                    <p id="header-title" class="text-emerald-600 font-medium mt-1 flex items-center gap-2">
                        <i class="fa-regular fa-calendar"></i> 標題
                    </p>
                </div>
                <button id="btn-add-activity" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg transition shadow hidden">
                    <i class="fa-solid fa-plus"></i> 新增行程
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 md:p-6 relative">
                <div class="max-w-3xl mx-auto relative">

                    <div class="absolute left-6 top-0 bottom-0 w-0.5 bg-gray-200 hidden sm:block"></div>
                    <div id="timeline-container">
                        <!-- 行程卡片會由 JS 動態生成 -->
                    </div>
                </div>
            </div>
        </div>

                <iframe id="map-iframe" width="100%" height="100%" style="border: 0;" loading="lazy" allowfullscreen src=""></iframe>
            </div>
            
            <div id="details-container" class="p-6 overflow-y-auto flex-1 hidden">

                    <!-- Type icon -->
                </div>
                <h2 id="detail-name" class="text-xl font-bold text-gray-900 mb-2"></h2>
                <p id="detail-time" class="text-gray-500 flex items-center gap-2 text-sm mb-6 pb-4 border-b border-gray-100"></p>
                
                <div class="space-y-4">
                    <div>
                        <h4 class="font-bold text-gray-800 text-sm mb-1">地點</h4>
                        <p id="detail-location" class="text-gray-600 text-sm leading-relaxed"></p>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-800 text-sm mb-1">簡介</h4>
                        <p id="detail-desc" class="text-gray-600 text-sm leading-relaxed"></p>
                    </div>
                    <div id="detail-tips-box" class="hidden">
                        <h4 class="font-bold text-amber-600 text-sm mb-1">小撇步</h4>
                        <p id="detail-tips" class="text-gray-600 text-sm leading-relaxed"></p>
                    </div>
                    
                    <div class="pt-6 mt-4 border-t border-gray-100">
                        <h4 class="font-bold text-gray-800 text-sm mb-3">開啟地圖導航</h4>
                        <div class="flex gap-2">
                            <a id="link-google-map" href="#" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-blue-50 text-blue-600 py-2 rounded-lg text-sm font-semibold hover:bg-blue-100 transition">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i> Google Map
                            </a>
                            <a id="link-amap" href="#" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-indigo-50 text-indigo-600 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-100 transition">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i> 高德地圖
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 未選取狀態 -->
            <div id="empty-details" class="flex-1 flex flex-col items-center justify-center text-gray-400 p-8 text-center">
                <i class="fa-solid fa-map text-5xl mb-4 text-gray-200"></i>
                <p>點擊左側行程項目，即可在此預覽地圖與詳細資訊</p>
            </div>
        </div>
    </div>

    <!-- 編輯 / 新增 Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 id="modal-title" class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-pen text-emerald-600"></i> 編輯行程
                </h2>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-4">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">時間安排 *</label>
                        <input type="text" id="form-time" placeholder="例如: 09:00 - 12:00" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none" />
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">類型</label>
                        <select id="form-type" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                            <option value="attraction">景點</option>
                            <option value="food">美食</option>
                            <option value="hotel">住宿</option>
                            <option value="transit">交通</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">名稱 *</label>
                    <input type="text" id="form-name" placeholder="景點/餐廳/飯店名稱" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">地圖搜尋關鍵字 (地點)</label>
                    <input type="text" id="form-location" placeholder="用於地圖搜尋，例如: 樂山大佛" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">簡介</label>
                    <textarea id="form-desc" rows="2" placeholder="行程介紹..." class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-amber-600 mb-1">溫馨提示 (Tips)</label>
                    <textarea id="form-tips" rows="2" placeholder="給長輩的提醒或注意事項..." class="w-full border border-amber-200 bg-amber-50 rounded-lg p-2.5 focus:ring-2 focus:ring-amber-500 outline-none resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-indigo-600 mb-1 flex items-center gap-1">
                        <i class="fa-solid fa-book-open"></i> 我的旅程日記 / 備忘錄
                    </label>
                    <textarea id="form-notes" rows="3" placeholder="在此隨手記錄花費、心情或備忘筆記..." class="w-full border border-indigo-200 bg-indigo-50 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
                </div>
            </div>

            <div class="p-5 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-5 py-2.5 text-gray-600 font-semibold hover:bg-gray-200 rounded-lg transition">取消</button>
                <button onclick="saveActivity()" class="px-5 py-2.5 bg-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700 transition flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-floppy-disk"></i> 儲存
                </button>
            </div>
        </div>
    </div>

    <!-- 分享連結 Modal -->
    <div id="share-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 text-center">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-share-nodes text-3xl text-emerald-600"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">專屬分享連結已產生</h3>
            <p class="text-gray-500 text-sm mb-6">將此連結傳給爸媽或親友，他們不需登入帳號也能隨時查看最新的行程表！（且無法修改內容）</p>
            
            <div class="flex items-center gap-2 bg-gray-50 p-3 rounded-lg border border-gray-200 mb-6">
                <input type="text" id="share-link-input" readonly class="flex-1 bg-transparent text-sm text-gray-600 outline-none" />
                <button onclick="copyShareLink()" class="flex items-center gap-1 bg-emerald-600 text-white px-3 py-1.5 rounded-md text-sm font-semibold hover:bg-emerald-700 transition shrink-0">
                    <i class="fa-solid fa-copy"></i> 複製
                </button>
            </div>
            
            <button onclick="closeShareModal()" class="text-gray-500 hover:text-gray-700 text-sm font-semibold">關閉</button>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded shadow-lg z-[100] flex items-center gap-2 transition-opacity duration-300 opacity-0">
        <i class="fa-solid fa-circle-info"></i>
        <span id="toast-msg">提示訊息</span>
    </div>

        // ==========================================

        let firebaseConfig = {};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sichuan-trip-2026';

        // 狀態管理
        let currentUser = null;

        // ==========================================

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('opacity-100');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }

        function getTypeInfo(type) {
            switch (type) {
                case 'food': return { icon: '<i class="fa-solid fa-mug-hot text-orange-500"></i>', label: '美食', color: 'orange' };
                case 'hotel': return { icon: '<i class="fa-solid fa-bed text-indigo-500"></i>', label: '住宿', color: 'indigo' };
                case 'transit': return { icon: '<i class="fa-solid fa-location-arrow text-blue-500"></i>', label: '交通', color: 'blue' };
                default: return { icon: '<i class="fa-solid fa-map-pin text-emerald-500"></i>', label: '景點', color: 'emerald' };
            }
        }

        // ==========================================
        // 4. 渲染邏輯
        // ==========================================
        function renderSidebar() {
            const container = document.getElementById('sidebar-days');
            container.innerHTML = '';
            
            itineraryData.forEach((day, index) => {
                const isSelected = day.id === selectedDayId;
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 md:w-full text-left p-3 my-1 rounded-xl transition-all duration-200 flex items-center gap-3 ${
                    isSelected ? 'bg-emerald-50 border border-emerald-200 text-emerald-800 shadow-sm' : 'hover:bg-gray-50 text-gray-600'
                }`;
                btn.onclick = () => window.selectDay(day.id);
                
                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${
                        isSelected ? 'bg-emerald-600 text-white' : 'bg-gray-200'
                    }">D${index + 1}</div>
                    <div class="hidden md:block">
                        <div class="font-semibold text-sm">${day.date}</div>
                    </div>
                `;
                container.appendChild(btn);
            });
        }

        function renderTimeline() {
            const dayData = itineraryData.find(d => d.id === selectedDayId);
            if (!dayData) return;

            document.getElementById('header-date').innerText = dayData.date;
            document.getElementById('header-title').innerHTML = `<i class="fa-regular fa-calendar"></i> ${dayData.title}`;

            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            if (dayData.activities.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-gray-400">目前沒有安排行程</div>';
                return;
            }

            dayData.activities.forEach(act => {
                const isSelected = selectedActivity && selectedActivity.id === act.id;
                const typeInfo = getTypeInfo(act.type);
                
                const actDiv = document.createElement('div');
                actDiv.className = 'mb-6 relative flex items-start gap-4 cursor-pointer group';
                actDiv.onclick = () => window.selectActivity(act);

                let controlsHtml = '';

                if (!isSharedView) {
                    controlsHtml = `
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="event.stopPropagation(); window.openEditModal('${dayData.id}', '${act.id}')" class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="event.stopPropagation(); window.deleteActivity('${dayData.id}', '${act.id}')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    `;
                }

                actDiv.innerHTML = `
                    <div class="hidden sm:flex z-10 mt-1 w-12 h-12 bg-white rounded-full border-4 border-gray-50 items-center justify-center shadow-sm relative -left-[1.35rem]">
                        ${typeInfo.icon}
                    </div>
                    <div class="flex-1 bg-white p-5 rounded-2xl shadow-sm border transition-all duration-200 hover:shadow-md ${
                        isSelected ? 'border-emerald-400 ring-1 ring-emerald-400' : 'border-gray-200'
                    }">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-2 text-emerald-600 font-bold text-sm bg-emerald-50 px-2 py-1 rounded-md">
                                <i class="fa-regular fa-clock"></i> ${act.time}
                            </div>
                            ${controlsHtml}
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-1">${act.name}</h3>
                        <p class="text-gray-500 text-sm flex items-center gap-1 mb-3">
                            <i class="fa-solid fa-map-pin"></i> ${act.location || '無地點資訊'}
                        </p>
                        <p class="text-gray-700 leading-relaxed text-sm mb-3">${act.description}</p>
                        
                        ${act.tips ? `
                            <div class="bg-amber-50 border-l-4 border-amber-400 p-3 rounded-r-lg text-sm text-amber-800 flex items-start gap-2 mb-2">
                                <i class="fa-solid fa-circle-info shrink-0 mt-0.5"></i>
                                <p>${act.tips}</p>
                            </div>
                        ` : ''}
                        
                        ${act.notes ? `
                            <div class="mt-3 bg-gray-50 p-3 rounded-lg text-sm text-gray-600 border border-gray-100 flex items-start gap-2">
                                <i class="fa-solid fa-book-open shrink-0 mt-0.5 text-emerald-500"></i>
                                <p class="italic">${act.notes}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
                container.appendChild(actDiv);
            });
        }

        function renderDetails() {
            const emptyContainer = document.getElementById('empty-details');
            const mapContainer = document.getElementById('map-container');
            const detailsContainer = document.getElementById('details-container');

            if (!selectedActivity) {
                emptyContainer.classList.remove('hidden');
                mapContainer.classList.add('hidden');
                detailsContainer.classList.add('hidden');
                return;
            }

            emptyContainer.classList.add('hidden');
            mapContainer.classList.remove('hidden');
            detailsContainer.classList.remove('hidden');

            const typeInfo = getTypeInfo(selectedActivity.type);
            const query = encodeURIComponent(selectedActivity.location || selectedActivity.name);
            const dayData = itineraryData.find(d => d.id === selectedDayId);

            document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${query}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
            
            document.getElementById('detail-type').innerHTML = `${typeInfo.icon} <span class="uppercase tracking-wider">${typeInfo.label}</span>`;
            document.getElementById('detail-name').innerText = selectedActivity.name;
            document.getElementById('detail-time').innerHTML = `<i class="fa-regular fa-clock"></i> ${dayData.date} | ${selectedActivity.time}`;
            document.getElementById('detail-location').innerText = selectedActivity.location || '未提供';
            document.getElementById('detail-desc').innerText = selectedActivity.description;

            const tipsBox = document.getElementById('detail-tips-box');
            if (selectedActivity.tips) {
                tipsBox.classList.remove('hidden');
                document.getElementById('detail-tips').innerText = selectedActivity.tips;
            } else {
                tipsBox.classList.add('hidden');
            }

            document.getElementById('link-google-map').href = `https://www.google.com/maps/search/?api=1&query=${query}`;
            document.getElementById('link-amap').href = `https://uri.amap.com/search?keyword=${query}`;
        }

        // ==========================================
        // 5. 資料存取與全域函式綁定
        // ==========================================
        const saveToFirestore = async () => {
            if (isSharedView || !currentUser) return; // 訪客不能存檔
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'itinerary', 'main');
                await setDoc(docRef, { days: itineraryData });
                showToast("儲存成功！");
            } catch (err) {
                console.error("Save error:", err);
                showToast("儲存失敗！");
            }
        };

        window.selectDay = (id) => {
            selectedDayId = id;
            selectedActivity = null;
            renderSidebar();
            renderTimeline();
            renderDetails();
        };

        window.selectActivity = (act) => {
            selectedActivity = act;
            renderTimeline();
            renderDetails();
        };

        window.openAddModal = () => {
            editingDayId = selectedDayId;
            editingActivityId = null;
            
            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-plus text-emerald-600"></i> 新增行程';
            document.getElementById('form-time').value = '';
            document.getElementById('form-type').value = 'attraction';
            document.getElementById('form-name').value = '';
            document.getElementById('form-location').value = '';
            document.getElementById('form-desc').value = '';
            document.getElementById('form-tips').value = '';
            document.getElementById('form-notes').value = '';
            
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.openEditModal = (dayId, actId) => {
            const day = itineraryData.find(d => d.id === dayId);
            const act = day.activities.find(a => a.id === actId);
            if (!act) return;

            editingDayId = dayId;
            editingActivityId = actId;

            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen text-emerald-600"></i> 編輯行程';
            document.getElementById('form-time').value = act.time || '';
            document.getElementById('form-type').value = act.type || 'attraction';
            document.getElementById('form-name').value = act.name || '';
            document.getElementById('form-location').value = act.location || '';
            document.getElementById('form-desc').value = act.description || '';
            document.getElementById('form-tips').value = act.tips || '';
            document.getElementById('form-notes').value = act.notes || '';

            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeEditModal = () => {
            document.getElementById('edit-modal').classList.add('hidden');
        };

        window.saveActivity = async () => {
            const time = document.getElementById('form-time').value;
            const name = document.getElementById('form-name').value;
            
            if (!time || !name) {
                showToast("請填寫時間與名稱");
                return;
            }

            const dayIndex = itineraryData.findIndex(d => d.id === editingDayId);
            if (dayIndex === -1) return;

            const newAct = {
                id: editingActivityId || `act-${Date.now()}`,
                time: time,
                type: document.getElementById('form-type').value,
                name: name,
                location: document.getElementById('form-location').value,
                description: document.getElementById('form-desc').value,
                tips: document.getElementById('form-tips').value,
                notes: document.getElementById('form-notes').value
            };

            if (editingActivityId) {
                const actIndex = itineraryData[dayIndex].activities.findIndex(a => a.id === editingActivityId);
                itineraryData[dayIndex].activities[actIndex] = newAct;
            } else {
                itineraryData[dayIndex].activities.push(newAct);
                itineraryData[dayIndex].activities.sort((a, b) => a.time.localeCompare(b.time));
            }

            await saveToFirestore();
            window.closeEditModal();
            renderTimeline();
            
            if (selectedActivity && selectedActivity.id === newAct.id) {
                window.selectActivity(newAct);
            }
        };

        window.deleteActivity = async (dayId, actId) => {
            if (!confirm("確定要刪除此行程嗎？")) return;
            const dayIndex = itineraryData.findIndex(d => d.id === dayId);
            if (dayIndex === -1) return;

            itineraryData[dayIndex].activities = itineraryData[dayIndex].activities.filter(a => a.id !== actId);
            await saveToFirestore();
            
            if (selectedActivity && selectedActivity.id === actId) {
                selectedActivity = null;
                renderDetails();
            }
            renderTimeline();
        };

        // 分享功能
        window.openShareModal = async () => {
            try {
                // 將當前資料存到公共資料夾
                const shareDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'shared', currentUser.uid);
                await setDoc(shareDocRef, { days: itineraryData });
                
                const url = `${window.location.origin}${window.location.pathname}?share=${currentUser.uid}`;
                document.getElementById('share-link-input').value = url;
                document.getElementById('share-modal').classList.remove('hidden');
            } catch (err) {
                console.error("Share error:", err);
                showToast("產生分享連結失敗");
            }
        };

        window.closeShareModal = () => {
            document.getElementById('share-modal').classList.add('hidden');
        };

        window.copyShareLink = () => {
            const input = document.getElementById('share-link-input');
            
            // 嘗試使用現代 Clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(input.value).then(() => {
                    showToast("已複製連結，趕快貼給家人吧！");
                    window.closeShareModal();
                }).catch(err => fallbackCopy(input));
            } else {
                fallbackCopy(input);
            }
        };

        function fallbackCopy(input) {
            input.select();
            document.execCommand("copy");
            showToast("已複製連結，趕快貼給家人吧！");
            window.closeShareModal();
        }

        // ==========================================
        // 6. 認證與初始化邏輯
        // ==========================================
        document.getElementById('btn-google-login').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error(error);
                showToast("登入失敗：" + error.message);
            }
        };

        document.getElementById('btn-logout').onclick = () => {
            if (isSharedView) {
                // 訪客返回正常模式
                window.location.href = window.location.origin + window.location.pathname;
            } else {
                signOut(auth);
            }
        };

        document.getElementById('btn-add-activity').onclick = () => window.openAddModal();
        document.getElementById('btn-share').onclick = () => window.openShareModal();

        const loadData = async () => {
            try {
                if (isSharedView && shareId) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shared', shareId);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        itineraryData = docSnap.data().days;
                    } else {
                        showToast("找不到此分享行程，載入預設行程");
                        itineraryData = JSON.parse(JSON.stringify(DEFAULT_ITINERARY));
                    }
                } else if (currentUser) {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'itinerary', 'main');
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        itineraryData = docSnap.data().days;
                    } else {
                        itineraryData = JSON.parse(JSON.stringify(DEFAULT_ITINERARY));
                        await setDoc(docRef, { days: itineraryData });
                    }
                }
                
                // 初始化畫面
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                if (isSharedView) {
                    document.getElementById('visitor-badge').classList.remove('hidden');
                    document.getElementById('btn-add-activity').classList.add('hidden');
                    document.getElementById('btn-share').classList.add('hidden');
                    document.getElementById('btn-logout').title = "返回登入頁";
                } else {
                    document.getElementById('btn-add-activity').classList.remove('hidden');
                    document.getElementById('btn-share').classList.remove('hidden');
                }

                renderSidebar();
                renderTimeline();
                renderDetails();

            } catch (err) {
                console.error("Data load error:", err);
                showToast("讀取資料失敗");
                document.getElementById('loading-screen').classList.add('hidden');
            }
        };

        const initAuth = async () => {
            try {
                if (isSharedView) {
                    await signInAnonymously(auth);
                } else if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                }
            } catch (err) {
                console.error("Auth init error:", err);
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            }
        };

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                loadData();
            } else {
                if (!isSharedView) {
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('login-screen').classList.remove('hidden');
                    document.getElementById('app-screen').classList.add('hidden');
                }
            }
        });

        // 啟動
        initAuth();

    </script>
</body>
</html>
